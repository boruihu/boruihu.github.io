  <div class="lightbox" id="lightbox">
    <img class="lightbox-img" id="lightbox-img" src="" alt="">
    <p class="lightbox-caption" id="lightbox-caption"></p>
  </div>

  <script>
    (() => {
      const lb = document.getElementById("lightbox");
      const lbImg = document.getElementById("lightbox-img");
      const lbCap = document.getElementById("lightbox-caption");

      function getCaptionLang() {
        try { return localStorage.getItem("lang") || "en"; } catch { return "en"; }
      }

      document.querySelectorAll(".life-photo").forEach((img) => {
        img.addEventListener("click", () => {
          lbImg.src = img.src;
          lbImg.alt = img.alt;
          const lang = getCaptionLang();
          const loc = img.dataset["loc" + lang.charAt(0).toUpperCase() + lang.slice(1)] || "";
          const desc = img.dataset["desc" + lang.charAt(0).toUpperCase() + lang.slice(1)] || "";
          lbCap.innerHTML = loc
            ? '<span class="cap-location">' + loc + '</span><span class="cap-desc">' + desc + '</span>'
            : "";
          lb.classList.add("open");
        });
      });

      lb.addEventListener("click", (e) => {
        if (e.target === lb || e.target === lbImg) {
          lb.classList.remove("open");
        }
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") lb.classList.remove("open");
      });
    })();
  </script>
