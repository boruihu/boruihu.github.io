  <script>
    (() => {
      const cat = document.querySelector(".site-cat");

      if (!cat) {
        return;
      }

      const actions = [
        { className: "cat-annoyed", duration: 1800 },
        { className: "cat-walk", duration: 2200 },
        { className: "cat-stretch", duration: 2600 },
      ];

      const reducedMotionQuery = window.matchMedia(
        "(prefers-reduced-motion: reduce)"
      );

      let isAnimating = false;
      let cleanupTimer = null;
      let previousAction = null;

      function chooseRandomAction() {
        let availableActions = actions;

        if (previousAction && actions.length > 1) {
          availableActions = actions.filter(
            (action) => action.className !== previousAction
          );
        }

        return availableActions[
          Math.floor(Math.random() * availableActions.length)
        ];
      }

      function clearActionClasses() {
        actions.forEach((action) => {
          cat.classList.remove(action.className);
        });

        cat.classList.remove("is-animating");
      }

      function playRandomAction() {
        if (isAnimating) {
          return;
        }

        const action = chooseRandomAction();
        const duration = reducedMotionQuery.matches
          ? 450
          : action.duration;

        isAnimating = true;
        previousAction = action.className;

        clearTimeout(cleanupTimer);
        clearActionClasses();

        void cat.offsetWidth;

        cat.classList.add("is-animating", action.className);

        cleanupTimer = window.setTimeout(() => {
          clearActionClasses();
          isAnimating = false;
        }, duration);
      }

      cat.addEventListener("click", playRandomAction);

      cat.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          playRandomAction();
        }
      });

      reducedMotionQuery.addEventListener?.("change", () => {
        clearTimeout(cleanupTimer);
        clearActionClasses();
        isAnimating = false;
      });
    })();
  </script>
