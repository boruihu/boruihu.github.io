<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Education – Borui HU</title>
  <link rel="stylesheet" href="style.css?v=4">
  <link rel="icon" href="favicon.svg">
  <style>
    .course-list {
      list-style: none;
      padding: 0;
      margin: 1.5rem 0 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .course-list li {
      padding: 0.6rem 0 0.6rem 0.75rem;
      border-left: 3px solid var(--accent);
      line-height: 1.4;
      transition: padding-left 0.2s;
    }

    .course-list li:hover {
      padding-left: 1rem;
    }

    @media (max-width: 480px) {
      .course-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1><span class="zh">胡博睿</span> Borui HU</h1>
    </header>

    <section>
      <p class="fade" data-i18n="education.desc">Mathematics major courses taken at USTC, excluding Mathematical Analysis and Linear Algebra.</p>

      <ul class="course-list">
        <li data-i18n="education.course0">Probability Theory</li>
        <li data-i18n="education.course1">Ordinary Differential Equations</li>
        <li data-i18n="education.course2">Partial Differential Equations</li>
        <li data-i18n="education.course3">Real Analysis</li>
        <li data-i18n="education.course4">Complex Analysis</li>
        <li data-i18n="education.course5">Modern Algebra</li>
      </ul>
    </section>

    <footer>
      <a href="/" data-i18n="footer.back">← Back</a>
    </footer>
  </main>

  <script src="i18n.js?v=2"></script>
</body>
</html>
